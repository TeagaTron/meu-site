<!DOCTYPE html>
<html>

<head>
  <title>Corinthians vs São Paulo</title>

  <style>

    body {
      margin: 0;
      font-family: system-ui, Arial;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .placar {
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 40px;
      margin-top: 20px;
    }

    .time {
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 180px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 20px;
      width: 200px;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      background: white;
      color: black;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: rgba(255,255,255,0.05);
      margin: 6px auto;
      padding: 10px;
      width: 260px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }

    .remover {
      background: red;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
    }

    .evento {
      margin-top: 15px;
      font-size: 18px;
      opacity: 0.9;
    }

  </style>
</head>

<body>

<h1>⚫⚪ Corinthians vs São Paulo 🔴⚪</h1>

<div class="placar">

  <div class="time">
    Corinthians<br>
    <span id="gols-corinthians">0</span>
  </div>

  <div>×</div>

  <div class="time">
    São Paulo<br>
    <span id="gols-sp">0</span>
  </div>

</div>

<input id="numero" placeholder="Adicionar gol (ex: 1, 2, 3)">
<br>

<button onclick="adicionar()">⚽ Adicionar Gol</button>

<div class="evento" id="evento"></div>

<ul id="lista"></ul>

<script>

let gols = [];

// 🧠 jogadores reais (aleatório)
const jogadores = [
  "Hugo Souza",
  "Rodrigo Garro",
  "Memphis Depay",
  "Yuri Alberto",
  "Breno Bidon",
  "Maycon",
  "Raniele",
  "Matheuzinho"
];

// 🔊 torcida
function gritar(){
  const msg = new SpeechSynthesisUtterance("VAI CORINTHIANS");
  msg.lang = "pt-BR";
  msg.rate = 0.9;
  msg.pitch = 1.1;
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

// ⚽ atualizar placar
function atualizarPlacar(){
  document.getElementById("gols-corinthians").innerText = gols.length;
}

// ➕ adicionar gol
function adicionar(){

  let num = document.getElementById("numero").value;

  if(!num) return;

  gols.push(num);

  const jogador = jogadores[Math.floor(Math.random() * jogadores.length)];

  document.getElementById("evento").innerText =
    `⚽ GOL DO CORINTHIANS! ${jogador}`;

  gritar();

  document.getElementById("numero").value = "";

  renderizar();
}

// ❌ remover gol
function remover(index){

  gols.splice(index,1);

  atualizarPlacar();
  renderizar();
}

// 📋 lista
function renderizar(){

  atualizarPlacar();

  let html = "";

  for(let i=0;i<gols.length;i++){

    html += `
      <li>
        ⚽ Gol ${gols[i]}
        <button class="remover" onclick="remover(${i})">X</button>
      </li>
    `;
  }

  document.getElementById("lista").innerHTML = html;
}

</script>

</body>
</html>
